<!doctype html>
<html>
    <head>
        <meta charset="UTF-8"/>
        <title>Clicker Game!</title>
        <link rel ="stylesheet" href="main.css"/>
    </head>
    <body>
        <main class="game-layout">
            <aside class="stats-panel"></aside>
            <section class="game-area">
                <p id="money">Money: $<span id="click-count">0</span></p>
        <button id="click-button">
            <img src="https://i.ibb.co/84dXZtBp/candy-vector.png" alt="Candy" width="300"/>
        </button>
            </section>
        <aside class="shop-panel" id="shop-container"></aside>
        </main>
        <script>
            let itemsOwned = [];
            const button = document.getElementById("click-button");
            const count = document.getElementById("click-count");
            let totalClickCount = 0;

            const shopContainer = document.getElementById("shop-container");

            function buttonClick(){
                console.log("Button was clicked!");

                const multiplierOwned = itemsOwned.find((i)=> i.name === "Sugar Rush");
                const multiplierCount = multiplierOwned ? multiplierOwned.amount : 0;

                totalClickCount = totalClickCount + 1 * 2 ** multiplierCount;

                count.textContent = totalClickCount;
            }

            const shopItems = [
                {
                    name: "Candy Factory",
                    description: "Sweet treats are mass produced, earning you massive profits!",
                    cost: 10,
                    startingCost: 10,
                },
                {
                    name: "Sugar Rush",
                    description: "A sudden burst of energy! Doubles the value of each click by 2.",
                    cost: 50,
                    startingCost: 50,
                },
            ];

            function createShopItems(){
                document.querySelectorAll(".shop-item").forEach((element) => {
                    element.remove();
                });

            shopItems.forEach((item)=> {
                const ownedRecord = itemsOwned.find((i) => i.name === item.name);
                const amountOwned = ownedRecord ? ownedRecord.amount : 0;

                const shopItem = document.createElement("div");
                shopItem.className = "shop-item";

                shopItem.innerHTML = `
                <div>
                    <h3>${item.name} (${amountOwned})</h3>
                    <p>${item.description}</p>
                </div>
                <button onclick="buyItem('${item.name}')">
                    Buy $${item.cost}
                </button>
                `;

                shopContainer.appendChild(shopItem);
            });
        }

            function buyItem(itemName) {
                const item = shopItems.find((i) => i.name === itemName);
                if (totalClickCount >= item.cost) {
                    totalClickCount -= item.cost;
                    count.textContent = totalClickCount;

                    let amount = 1;

                    const itemInArray = itemsOwned.find((obj) => obj.name === item.name);
                    if (itemInArray) {
      itemInArray.amount++;
      console.log(`Found ${item.name}, added 1!`);
      amount = itemInArray.amount;
    } else {
      itemsOwned.push({ name: item.name, amount: 1 });
      console.log(`Added ${item.name} to itemsOwned!`);
    }

    item.cost = item.startingCost + item.startingCost * amount ** 2;
    createShopItems (); 

    console.log(`Bought ${itemName}!`);
  } else {
    console.log(`Not enough clicks! You need ${item.cost}`);
  }
}

setInterval(() => {
    const candyOwned = itemsOwned.find((i) => i.name === "Candy Factory");
    if (candyOwned) {
        for (let i = 0; i < candyOwned.amount; i++) {
            buttonClick();
        }
    }
}, 1000);
            button.addEventListener("click", function(){
                buttonClick();

                 const multiplierOwned = itemsOwned.find((i) => i.name === "Sugar Rush");
    const multiplierCount = multiplierOwned ? multiplierOwned.amount : 0;
    const cashAdded = 1 * 2 ** multiplierCount;

    const floatingText = document.createElement("div");
    floatingText.className = "floating-text";
    floatingText.textContent = `+$${cashAdded}`;

    const rect = button.getBoundingClientRect();
    floatingText.style.left = `${rect.left + (rect.width / 2) - 20 + (Math.random() * 40 - 20)}px`;
    floatingText.style.top = `${rect.top + (rect.height / 2) - 20}px`;

    document.body.appendChild(floatingText);

    setTimeout(() => {
        floatingText.remove();
    }, 800);
});
            createShopItems();
        </script>
    </body>
</html>
